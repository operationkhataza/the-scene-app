<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Native-app feel: lock zoom entirely (no pinch, no double-tap zoom).
       Same viewport contract as event-guide.html so the calendar feels
       native inside Fabrik's WebView. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F4F7FB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Cape Town's live music calendar — a scrollable month view of every event, curated by The Scene.">
  <title>Calendar — The Scene Cape Town</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="gigs-page calendar-page">

    <!-- Page header — same glass treatment as the gig guide so the two
         surfaces read as one app. Title shows the current month. -->
    <header class="gigs-header calendar-header">
      <h1 class="gigs-header__title" id="calendar-eyebrow">Cape Town Cultural Calendar</h1>

      <!-- Featured events carousel — sits INSIDE the header panel, filling the
           space under the title. Hidden until calendar.js finds active slots for
           the current week. Flyer-forward cards; tapping opens the event modal. -->
      <section class="featured-carousel" id="featured-carousel" hidden aria-label="Featured events">
        <div class="featured-carousel__header">
          <span class="featured-carousel__label"><span class="featured-carousel__star" aria-hidden="true">★</span>Featured this week</span>
        </div>
        <div class="featured-carousel__track" id="featured-carousel-track"></div>
      </section>
    </header>

    <!-- Month navigator: prev chevron · month label · next chevron.
         Tapping the central label returns to today. -->
    <div class="cal-nav" id="cal-nav" role="navigation" aria-label="Month navigation">
      <button class="cal-nav__chev" id="cal-nav-prev" type="button" aria-label="Previous month">
        <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="cal-nav__month-label" id="cal-nav-month-label" aria-live="polite">May 2026</span>
      <button class="cal-nav__chev" id="cal-nav-next" type="button" aria-label="Next month">
        <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Weekday header row. Stays fixed; cells below scroll if needed. -->
    <div class="cal-weekdays" aria-hidden="true">
      <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
      <span>Thu</span><span>Fri</span><span>Sat</span>
    </div>

    <!-- Month grid. Populated by calendar.js: 7 cols × N rows, where each
         cell carries the day number + up to 3 tier-coloured pips
         indicating events on that day. -->
    <!-- Loading state: calendar.js fills this with a skeleton grid
         (renderGridSkeleton) at the top of init(), before the first
         fetchMonth. renderGrid() overwrites it when data arrives. -->
    <section class="cal-grid" id="cal-grid" role="grid" aria-label="Month calendar"></section>

    <!-- Selected day panel — shows that day's events as mini-cards stacked
         vertically (manual §7 mini-card spec: 48px image + title + meta).
         Initially shows today; updates on cell tap. -->
    <section class="cal-day" id="cal-day" aria-live="polite">
      <!-- populated by calendar.js -->
    </section>

    <footer class="app-footer-contact">
      If you need to contact us, please email <a href="mailto:support@thescenecapetown.co.za">support@thescenecapetown.co.za</a>
    </footer>

  </main>

  <!-- Event detail modal — hero-expand animation from the tapped card.
       .cal-modal gains .is-open when active; .cal-modal__card holds the
       full gig-card (front + flippable back). Tapping the backdrop closes. -->
  <div class="cal-modal" id="cal-modal" role="dialog" aria-modal="true" aria-label="Event details">
    <div class="cal-modal__backdrop"></div>
    <div class="cal-modal__card" id="cal-modal-card"></div>
  </div>

  <!-- Promoter profile sheet — slides up over the event modal when a
       promoter pill is tapped. Reuses the .sheet component from the gig
       guide; data-mode="promoter" gives it the dark-green styling. -->
  <div class="sheet-backdrop" id="promoter-backdrop" aria-hidden="true"></div>
  <aside class="sheet" id="promoter-sheet" data-mode="promoter"
         role="dialog" aria-modal="true" aria-labelledby="promoter-sheet-title">
    <div class="sheet__grip" aria-hidden="true"></div>
    <header class="sheet__header">
      <h2 class="sheet__title" id="promoter-sheet-title">Promoter</h2>
      <button class="sheet__close" id="promoter-sheet-close" type="button" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </header>
    <div class="sheet__body" id="promoter-sheet-body"></div>
  </aside>

  <script type="module" src="holo-shader.js"></script>
  <script type="module" src="calendar.js"></script>
</body>
</html>
